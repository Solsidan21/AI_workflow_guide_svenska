site_name: "AI-djupdykning — Från chatt till system"
site_url: https://solsidan21.github.io/AI_workflow_guide_svenska/
site_description: En guide för dig som redan använder AI men vill ta språnget från chatt till system
repo_url: https://github.com/Solsidan21/AI_workflow_guide_svenska
repo_name: Solsidan21/AI_workflow_guide_svenska

theme:
  name: material
  language: sv
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Byt till mörkt läge
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Byt till ljust läge
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search:
      lang: sv

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Start: index.md
  - Del 1 — Förstå landskapet:
      - 01 — AI-verktygslandskapet: 01-verktygslandskapet.md
      - 02 — Promptteknik och kontext: 02-promptteknik-och-kontext.md
      - 03 — Begreppen som tar dig till nästa nivå: 03-begreppen.md
      - 04 — Mappstruktur och arbetssätt: 04-mappstruktur-och-arbetssatt.md
      - 05 — Strukturerad kontext: 05-strukturerad-kontext.md
  - Del 2 — Praktiska exempel:
      - "06 — Exempel: Studier": 06-exempel-studier.md
      - "07 — Exempel: Private Equity": 07-exempel-private-equity.md
      - "08 — Exempel: Marknadsförare": 08-exempel-marknadsforing.md
      - "09 — Exempel: Konsult": 09-exempel-konsult.md
