site_name: "AI Workflow Guide — Från chatt till system"
site_url: https://solsidan21.github.io/AI_workflow_guide_svenska/
site_description: En guide för dig som redan använder AI men vill ta språnget från chatt till system
repo_url: https://github.com/Solsidan21/AI_workflow_guide_svenska
repo_name: Solsidan21/AI_workflow_guide_svenska

theme:
  name: material
  language: sv
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Byt till mörkt läge
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Byt till ljust läge
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search:
      lang: sv

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra:
  analytics:
    provider: google
    property: G-YDFX3B82KF

nav:
  - Start: index.md
  - Del 1 — Förstå landskapet:
      - 01 — AI-verktygslandskapet: 01-verktygslandskapet.md
      - 02 — Promptteknik och kontext: 02-promptteknik-och-kontext.md
      - 03 — Mappstruktur och arbetssätt: 03-mappstruktur-och-arbetssatt.md
      - 04 — Strukturerad kontext: 04-strukturerad-kontext.md
  - Del 2 — Praktiska exempel:
      - "05 — Exempel: Studier": 05-exempel-studier.md
      - "06 — Exempel: Private Equity": 06-exempel-private-equity.md
      - "07 — Exempel: Marknadsförare": 07-exempel-marknadsforing.md
      - "08 — Exempel: Konsult": 08-exempel-konsult.md
  - Ordlista: ordlista.md
