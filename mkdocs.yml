site_name: AI Workflow Guide
site_url: https://solsidan21.github.io/AI_workflow_guide_svenska/
site_description: En guide för dig som redan använder AI men vill ta språnget från chatt till system
repo_url: https://github.com/Solsidan21/AI_workflow_guide_svenska
repo_name: Solsidan21/AI_workflow_guide_svenska

theme:
  name: material
  language: sv
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Byt till mörkt läge
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Byt till ljust läge
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search:
      lang: sv

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Start: index.md
  - Kapitel:
      - 00 — Varför bli lite teknisk: 00-varfor-bli-teknisk.md
      - 01 — AI-verktygslandskapet: 01-fran-chatt-till-system.md
      - 02 — Claude Code: 02-claude-code.md
      - 03 — Claude Cowork: 03-claude-cowork.md
      - 04 — Mappstruktur och kontext: 04-mappstruktur-och-kontext.md
      - 05 — PE-arbetsflöden med Claude: 05-pe-arbetsfloden.md
